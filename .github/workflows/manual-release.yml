name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.2.3
        required: true
      branch:
        description: Branch to release from
        required: true
        default: main

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/swagfront

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Normalize version
        id: version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Update package versions
        run: node scripts/set-version.mjs ${{ steps.version.outputs.value }}

      - name: Ensure version changed
        shell: bash
        run: |
          if git diff --quiet -- package.json backend/package.json frontend/package.json shared/package.json; then
            echo "Version ${{ steps.version.outputs.value }} is already set in the repo"
            exit 1
          fi

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Discard transient Yarn install state
        shell: bash
        run: git checkout -- .yarn/install-state.gz || true

      - name: Commit release version
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json backend/package.json frontend/package.json shared/package.json
          git commit -m "chore: release ${{ steps.version.outputs.tag }}"

      - name: Create git tag
        run: git tag ${{ steps.version.outputs.tag }}

      - name: Push commit and tag
        run: |
          git push origin HEAD:${{ inputs.branch }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
